        // Função para limpar "sim," e "não," APENAS se estiverem no INÍCIO do nome
   function limparNomeEmpresa(nome) {
    if (!nome) return '';
    
    let nomeLimpo = nome;


    // Padrões para remover "sim," e "não," em qualquer variação (case insensitive)
    const padroesSim = [
        /^sim,\s*/i,           // sim, no início
        /\ssim,\s*/i,          // sim, no meio
        /,\s*sim,\s*/i,        // ,sim,
        /sim\s*$/i,            // sim no final
        /sim\s*,\s*/i,         // sim ,
        /^sim\s*$/i            // apenas sim
    ];
    
    const padroesNao = [
        /^não,\s*/i,           // não, no início
        /^nao,\s*/i,           // nao, no início
        /\snão,\s*/i,          // não, no meio
        /\snao,\s*/i,          // nao, no meio
        /,\s*não,\s*/i,        // ,não,
        /,\s*nao,\s*/i,        // ,nao,
        /não\s*$/i,            // não no final
        /nao\s*$/i,            // nao no final
        /não\s*,\s*/i,         // não ,
        /nao\s*,\s*/i,         // nao ,
        /^não\s*$/i,           // apenas não
        /^nao\s*$/i,           // apenas nao
        /\bnão\b/i,            // não como palavra isolada
        /\bnao\b/i             // nao como palavra isolada
    ];

    const padroesAinda = [
        /^Ainda,\s*/i,           // não, no início
        /^ainda,\s*/i,           // nao, no início
        /\snão,\s*/i,          // não, no meio
        /\snao,\s*/i,          // nao, no meio
        /,\s*não,\s*/i,        // ,não,
        /,\s*nao,\s*/i,        // ,nao,
        /não\s*$/i,            // não no final
        /nao\s*$/i,            // nao no final
        /não\s*,\s*/i,         // não ,
        /nao\s*,\s*/i,         // nao ,
        /^não\s*$/i,           // apenas não
        /^nao\s*$/i,           // apenas nao
        /\bAinda\b/i,            // não como palavra isolada
        /\bnao\b/i             // nao como palavra isolada
    ];
    
    // Aplicar remoção de todos os padrões de "sim"
    for (const padrao of padroesSim) {
        nomeLimpo = nomeLimpo.replace(padrao, '');
    }
    
    // Aplicar remoção de todos os padrões de "não"
    for (const padrao of padroesNao) {
        nomeLimpo = nomeLimpo.replace(padrao, '');
    }



    for (const padrao of padroesAinda) {
        nomeLimpo = nomeLimpo.replace(padrao, '');
    }
    
    // Limpar vírgulas extras, espaços duplicados e trim
    nomeLimpo = nomeLimpo
        .replace(/\s*,\s*/g, ',')  // normaliza vírgulas com espaços
        .replace(/,,+/g, ',')       // remove vírgulas duplicadas
        .replace(/^\s*,\s*/, '')    // remove vírgula no início
        .replace(/\s*,\s*$/, '')    // remove vírgula no final
        .replace(/\s+/g, ' ')       // normaliza espaços
        .trim();
    
    // Se depois de toda limpeza ficou vazio, retorna string vazia
    if (nomeLimpo === '' || nomeLimpo === ',' || nomeLimpo === ' ') {
        return '';
    }
    
    return nomeLimpo;
}

        // Função para obter o nome a ser exibido
        function obterNomeExibicao(cliente) {
            let empresaNome = cliente.empresaNome || '';
            let nomePessoa = cliente.nome || '';
            
            // Limpar o nome da empresa (remover sim/não APENAS do início)
            let empresaNomeLimpo = limparNomeEmpresa(empresaNome);

            console.log(empresaNomeLimpo)
            
            // PRIMEIRA TENTATIVA: empresaNome limpo (se não estiver vazio e tiver até 25 caracteres)
            if (empresaNomeLimpo && empresaNomeLimpo !== '' && empresaNomeLimpo.length <= 25) {
                return empresaNomeLimpo;
            }
            
            // SEGUNDA TENTATIVA: nome da pessoa (se tiver até 25 caracteres)
            if (nomePessoa && nomePessoa !== '' && nomePessoa.length <= 25) {
                return nomePessoa;
            }
            
            // TERCEIRA TENTATIVA: empresaNome limpo (se existir) - corta para 23 + ...
            if (empresaNomeLimpo && empresaNomeLimpo !== '') {
                return empresaNomeLimpo.substring(0, 23);
            }
            
            // QUARTA TENTATIVA: nome da pessoa (se existir) - corta para 23 + ...
            if (nomePessoa && nomePessoa !== '') {
                return nomePessoa.substring(0, 23);
            }
            
            // ÚLTIMO CASO: fallback
            return 'Nome da Empresa';
        }

        // Converter para preto e branco
        function converterParaPretoBranco(base64) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    canvas.width = img.width;
                    canvas.height = img.height;
                    
                    ctx.drawImage(img, 0, 0);
                    
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);


                    const data = imageData.data;
                    
                    for (let i = 0; i < data.length; i += 4) {
                        const red = data[i];
                        const green = data[i + 1];
                        const blue = data[i + 2];
                        
                        const gray = red * 0.299 + green * 0.587 + blue * 0.114;
                        
                        data[i] = gray;
                        data[i + 1] = gray;
                        data[i + 2] = gray;
                    }
                    
                    ctx.putImageData(imageData, 0, 0);
                    resolve(canvas.toDataURL('image/png'));
                };
                img.src = base64;
            });
        }

        // Atualizar cartão com dados do cliente
        async function atualizarCartao(cliente) {
            const nameElement = document.getElementById('nameElement');
            const nameElementG = document.getElementById('nameElementG');
            const emailElement = document.getElementById('emailElement');
            const telElement = document.getElementById('telElement');
            const cardLogo1 = document.getElementById('cardLogo1');
            const cardLogo2 = document.getElementById('cardLogo2');
            const cardLogo3 = document.getElementById('cardLogo3');
            
            // Atualizar textos com a nova lógica
            const nomeExibicao = obterNomeExibicao(cliente);

            nameElement.textContent = nomeExibicao;
            nameElementG.textContent = nomeExibicao;
            nameElement.style.display = 'block';
            nameElementG.style.display = 'block';

            emailElement.innerHTML = `<i class="fa-solid fa-envelope"></i> ${cliente.email}` || 'email@empresa.com';
            telElement.innerHTML = `<i class="fa-brands fa-whatsapp"></i> ${cliente.telefone}` || '(11) 99999-9999';
            
            // VERIFICAR SE TEM LOGO
         // VERIFICAR SE TEM LOGO (Cloudinary)
const urlImagem = cliente.logoUrl || cliente.logoBase64; // Suporte aos dois formatos

if (urlImagem) {
    // Se for URL do Cloudinary, precisa carregar como imagem primeiro
    if (urlImagem.startsWith('http')) {
        // Carregar imagem do Cloudinary
        const img = new Image();
        img.crossOrigin = 'anonymous';
        
        await new Promise((resolve, reject) => {
            img.onload = resolve;
            img.onerror = reject;
            img.src = urlImagem;
        });
        
        // Converter para base64 para poder manipular
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        const base64 = canvas.toDataURL('image/png');
        
        // Converter para preto e branco
        logoPBBase64 = await converterParaPretoBranco(base64);
        
        // Usar a URL original do Cloudinary (mais eficiente)
        cardLogo1.src = urlImagem;
        cardLogo1.style.display = 'block';
        
        cardLogo2.src = urlImagem;
        cardLogo2.style.display = 'block';
        
        // Logo 3 - preto e branco (usando base64 convertido)
        cardLogo3.src = logoPBBase64;
        cardLogo3.style.display = 'block';
    } else {
        // Já é base64 (formato antigo)
        logoPBBase64 = await converterParaPretoBranco(urlImagem);
        
        cardLogo1.src = urlImagem;
        cardLogo1.style.display = 'block';
        
        cardLogo2.src = urlImagem;
        cardLogo2.style.display = 'block';
        
        cardLogo3.src = logoPBBase64;
        cardLogo3.style.display = 'block';
    }
} else {
    window.location.href = 'semlogo.html';
    // Esconder os elementos de logo
    cardLogo1.style.display = 'none';
    cardLogo2.style.display = 'none';
    cardLogo3.style.display = 'none';
}

        // FUNÇÃO: Baixar tudo
        function baixarTudo() {
            if (!clienteAtual) return;
            
            const loadingTemp = document.createElement('div');
            loadingTemp.className = 'loading-temp';
            loadingTemp.textContent = 'Preparando todos os arquivos... Aguarde!';
            document.body.appendChild(loadingTemp);

            // Função auxiliar para baixar uma imagem
            function downloadImage(dataUrl, fileName) {
                const link = document.createElement('a');
                link.download = fileName;
                link.href = dataUrl;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }

            // Sequência de downloads com delay
            setTimeout(() => {
                // Logo original
                if (clienteAtual.logoBase64) {
                    downloadImage(
                        clienteAtual.logoBase64, 
                        `logo-original-${clienteAtual.nome || 'cliente'}.png`
                    );
                }
            }, 100);

            setTimeout(() => {
                // Logo preto e branco
                if (logoPBBase64) {
                    downloadImage(
                        logoPBBase64, 
                        `logo-pb-${clienteAtual.nome || 'cliente'}.png`
                    );
                }
            }, 500);

            setTimeout(() => {
                // PNG do cartão
                baixarCartao();
            }, 900);

            setTimeout(() => {
                // PDF com capa
                baixarPDFComCapa();
                document.body.removeChild(loadingTemp);
            }, 1300);
        }
        
        // Baixar cartão como PNG
        function baixarCartao() {
            if (!clienteAtual) return;
            
            const loadingTemp = document.createElement('div');
            loadingTemp.className = 'loading-temp';
            loadingTemp.textContent = 'Gerando PNG... Aguarde!';
            document.body.appendChild(loadingTemp);
            
            html2canvas(cardContainer, {
                width: 600,
                height: 400,
                scale: 3,
                useCORS: true,
                allowTaint: false,
                backgroundColor: null,
                logging: false
            }).then(canvas => {
                const imageData = canvas.toDataURL('image/png');
                
                const link = document.createElement('a');
                link.download = `cartao-visita-${clienteAtual.nome || 'cliente'}.png`;
                link.href = imageData;
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                document.body.removeChild(loadingTemp);
                
            }).catch(error => {
                console.error('Erro ao gerar PNG:', error);
                alert('Erro ao gerar o PNG. Tente novamente.');
                document.body.removeChild(loadingTemp);
            });
        }

        // PDF com capa
        function baixarPDFComCapa() {
            if (!clienteAtual) return;
            
            const loadingTemp = document.createElement('div');
            loadingTemp.className = 'loading-temp';
            loadingTemp.textContent = 'Gerando PDF com capa... Aguarde!';
            document.body.appendChild(loadingTemp);
            
            html2canvas(cardContainer, {
                width: 600,
                height: 400,
                scale: 3,
                useCORS: true,
                allowTaint: false,
                backgroundColor: null,
                logging: false
            }).then(canvas => {
                const imageData = canvas.toDataURL('image/png');
                const logoPatrocinador = document.getElementById('logoPatrocinador').src;
                
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: 'portrait',
                    unit: 'mm',
                    format: 'a4'
                });

                // PRIMEIRA PÁGINA - CAPA
                // Fundo
                pdf.setFillColor(32, 57, 97);
                pdf.rect(0, 0, 210, 297, 'F');
                
                // Logo do patrocinador
                pdf.addImage(logoPatrocinador, 'PNG', 75, 40, 60, 22);
                
                // Título
                pdf.setFontSize(32);
                pdf.setTextColor(255, 255, 255);
                pdf.setFont('helvetica', 'bold');
                pdf.text('PROJETO LOGOMARCA', 105, 120, { align: 'center' });
                
                // Linha decorativa
                pdf.setDrawColor(255, 255, 255);
                pdf.setLineWidth(1);
                pdf.line(60, 130, 150, 130);
                
                // Informações do cliente
                pdf.setFontSize(20);
                pdf.text('CLIENTE:', 105, 160, { align: 'center' });
                pdf.setFontSize(24);
                pdf.text(clienteAtual.nome || 'Não informado', 105, 175, { align: 'center' });
                
                pdf.setFontSize(16);
                pdf.text('EMPRESA:', 105, 195, { align: 'center' });
                pdf.setFontSize(18);
                pdf.text(clienteAtual.empresaNome || clienteAtual.nomeFantasia || 'Não informado', 105, 210, { align: 'center' });
                
                // SEGUNDA PÁGINA - CARTAO
                pdf.addPage();
                pdf.setPage(2);
                
                // Adicionar o cartão centralizado
                const imgWidth = 180;
                const imgHeight = 120;
                const x = (210 - imgWidth) / 2;
                const y = (297 - imgHeight) / 2;
                
                pdf.addImage(imageData, 'PNG', x, y, imgWidth, imgHeight);
                
                // Informações do cliente na segunda página
                pdf.setFontSize(10);
                pdf.setTextColor(100, 100, 100);
                pdf.text(`Cliente: ${clienteAtual.nome || 'Não informado'}`, 15, 285);
                pdf.text(`Empresa: ${clienteAtual.empresaNome || clienteAtual.nomeFantasia || 'Não informado'}`, 15, 290);

                // Baixar o PDF
                pdf.save(`projeto-logomarca-${clienteAtual.nome || 'cliente'}.pdf`);
                document.body.removeChild(loadingTemp);
                
            }).catch(error => {
                console.error('Erro ao gerar PDF:', error);
                alert('Erro ao gerar o PDF. Tente novamente.');
                document.body.removeChild(loadingTemp);
            });
        }

        // PDF simples (mantida para compatibilidade)
        function baixarPDF() {
            baixarPDFComCapa();
        }

        // Voltar para tela anterior
        function voltar() {
            window.location.href = 'visualizacao.html';
        }
    </script>
