<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Logomarca - Visualização</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            justify-content: center;
            align-items: center;
            margin: 0 auto;
        }

        .container {
            margin: 0 auto;
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        /* HEADER */
        .header {
            align-items: center;
            height: 100%;
            padding: 6px;
            margin-top: 40px;
            background-color: #2f959a;    
            width: 70%;
        }

        .header-left {
            padding-left: 30px;
            border-radius: 0 8px 8px 0;
        }

        .header-left h1 {
            color: white;
            font-size: 16px;
            font-weight: 300;
            line-height: 1.2;
        }

        .header-left p {
            color: white;
            font-size: 12px;
            opacity: 0.9;
        }

        /* INFORMAÇÕES DO CLIENTE */
        .client-info {
            background: #f7fafc;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 40px;
            text-align: left;
        }
        
        .client-info h3 {
            color: #2d3748;
            margin-bottom: 15px;
            border-bottom: 2px solid #3A8F90;
            padding-bottom: 5px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding: 5px 0;
        }
        
        .info-label {
            font-weight: 600;
            color: #4a5568;
        }
        
        .info-value {
            color: #2d3748;
            text-align: right;
        }

        /* CARDS DE VISUALIZAÇÃO */
        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 60px;
            margin: 0px 0;
            margin-top: 10px;
        }

        .card-row {
            display: flex;
            align-items: center;
            gap: 40px;
            justify-content: center;
            flex-wrap: nowrap;
        }

        .preview-box {
            width: 250px;
            height: 250px;
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .preview-box img {
            width: 250px;
            height: 250px;
            object-fit: contain;
        }

        .download-btn {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            color: #3A8F90;
            font-size: 0.85rem;
            font-weight: 600;
            transition: transform 0.2s;
            padding: 4px 8px;
        }

        .download-btn:hover {
            transform: scale(1.05);
        }

        .download-btn .arrow {
            font-size: 1.3rem;
            line-height: 1;
        }

        /* BOTÃO CARTÃO DE VISITA */
        .cartao-btn-container {
            display: flex;
            justify-content: flex-end;
            margin: 0px 0;
        }

        .cartao-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            color: #3A8F90;
            font-weight: 600;
            transition: transform 0.2s;
            padding: 6px 12px;
        }

        .cartao-btn:hover {
            transform: scale(1.05);
        }

        .cartao-btn .arrow {
            font-size: 1.2rem;
            line-height: 1;
        }

        /* LOADING */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .loading-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2f959a;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logos img {
            margin: 0 auto;
            width: 300px;
            text-align: center;
        }

        .logos {
            margin: 0 auto;
            text-align: center;
        }

        .header-right {
            margin-left: 20px;
            cursor: pointer;
        }

        .error-message {
            color: #e53e3e;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- HEADER -->
        <div style="display: flex;"> 
            <header class="header">
                <div class="header-left">
                    <h1 style='font-family: "Source Sans 3", sans-serif; font-optical-sizing: auto; font-weight: 400; font-style: normal;'>Projeto Logomarca</h1>
                    <p id="nomeAlunoHeader">Carregando...</p>
                </div>
            </header>

            <div class="header-right" onclick="paginainicial()">
                <img style="width: 95px; height: 70px; margin-top: 30px; border: 2px solid #817f7f" src="gerar.png" alt="Gerar">
            </div>
        </div>

        <!-- INFORMAÇÕES DO CLIENTE -->
        <div class="client-info" style="display: none;">
            <h3>📋 Dados do Cliente</h3>
            <div class="info-row">
                <span class="info-label">Nome:</span>
                <span class="info-value" id="clientName">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Empresa:</span>
                <span class="info-value" id="clientCompany">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Email:</span>
                <span class="info-value" id="clientEmail">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Telefone:</span>
                <span class="info-value" id="clientPhone">-</span>
            </div>
        </div>

        <!-- CARDS DE VISUALIZAÇÃO -->
        <div class="cards-container">
            <!-- CARD 1 - LOGO COLORIDA -->
            <div class="card-row">
                <div class="preview-box" id="previewColorida">
                    <img id="logoColoridaImg" src="" alt="Logo Colorida" style="display: none;" crossorigin="anonymous">
                </div>
                <button class="download-btn" onclick="baixarLogo('colorida')">
                    <span style="color: #807f7f">Download Color</span>
                    <span class="arrow">▼</span>
                </button>
            </div>

            <!-- CARD 2 - LOGO PB -->
            <div class="card-row">
                <div class="preview-box" id="previewPB">
                    <img id="logoPBImg" src="" alt="Logo PB" style="display: none;" crossorigin="anonymous">
                </div>
                <button class="download-btn" onclick="baixarLogo('pb')">
                    <span style="color: #807f7f">Download PB</span>
                    <span class="arrow">▼</span>
                </button>
            </div>
        </div>

        <!-- BOTÃO CARTÃO DE VISITA -->
        <div class="cartao-btn-container">
            <button class="cartao-btn" onclick="irParaCartao()">
                <span style="color: #807f7f">Cartão de Visita</span>
                <span class="arrow" style="transform: rotate(270deg);">▼</span>
            </button>
        </div>
    </div>

    <div class="logos">
        <img src="logos.png" alt="Logos">
    </div>

    <script>
        let clienteAtual = null;
        let logoPBBase64 = null;
        let logoColoridaBase64 = null;
        let carregando = false;

        // Mostrar loading
        function mostrarLoading(mensagem = 'Carregando...') {
            const overlay = document.createElement('div');
            overlay.id = 'loadingOverlay';
            overlay.className = 'loading-overlay';
            overlay.innerHTML = `
                <div class="loading-box">
                    <div class="loading-spinner"></div>
                    <p>${mensagem}</p>
                </div>
            `;
            document.body.appendChild(overlay);
        }

        // Esconder loading
        function esconderLoading() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.remove();
        }

        // Carregar dados do cliente
        document.addEventListener('DOMContentLoaded', function() {
            const clienteData = sessionStorage.getItem('clienteData');
            
            if (!clienteData) {
                alert('Nenhum dado de cliente encontrado. Volte para a tela inicial.');
                window.location.href = 'pag1.html';
                return;
            }

            clienteAtual = JSON.parse(clienteData);
            
            // Atualizar header
            document.getElementById('nomeAlunoHeader').textContent = obterNomeExibicao(clienteAtual);
            
            // Atualizar informações
            document.getElementById('clientName').textContent = clienteAtual.nome || 'Não informado';
            document.getElementById('clientCompany').textContent = clienteAtual.empresaNome || clienteAtual.nomeFantasia || 'Não informado';
            document.getElementById('clientEmail').textContent = clienteAtual.email || 'Não informado';
            document.getElementById('clientPhone').textContent = clienteAtual.telefone || 'Não informado';
            
            // Carregar logos
            carregarLogos();
        });

        function paginainicial() {
            window.location.href = 'pag1.html';
        }

        // Função para obter a URL da imagem (suporta tanto logoUrl quanto logoBase64)
        function obterUrlImagem() {
            // Priorizar logoUrl (Cloudinary)
            if (clienteAtual.logoUrl) {
                return clienteAtual.logoUrl;
            }
            // Fallback para logoBase64 (compatibilidade)
          
            return null;
        }

        // Converter URL de imagem para Base64 (necessário para download e PB)
        async function urlParaBase64(url) {
            return new Promise((resolve, reject) => {
                // Se já for base64, retorna diretamente
                if (url.startsWith('data:image')) {
                    resolve(url);
                    return;
                }

                const img = new Image();
                img.crossOrigin = 'anonymous'; // Importante para Cloudinary
                
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    
                    try {
                        const base64 = canvas.toDataURL('image/png');
                        resolve(base64);
                    } catch (e) {
                        reject(e);
                    }
                };
                
                img.onerror = function() {
                    reject(new Error('Erro ao carregar imagem'));
                };
                
                img.src = url;
            });
        }

        // Converter para preto e branco (a partir de base64)
        async function converterParaPretoBranco(base64) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    canvas.width = img.width;
                    canvas.height = img.height;
                    
                    ctx.drawImage(img, 0, 0);
                    
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    
                    for (let i = 0; i < data.length; i += 4) {
                        const red = data[i];
                        const green = data[i + 1];
                        const blue = data[i + 2];
                        
                        const gray = red * 0.299 + green * 0.587 + blue * 0.114;
                        
                        data[i] = gray;
                        data[i + 1] = gray;
                        data[i + 2] = gray;
                    }
                    
                    ctx.putImageData(imageData, 0, 0);
                    resolve(canvas.toDataURL('image/png'));
                };
                
                img.src = base64;
            });
        }

        // Carregar logos
        async function carregarLogos() {
            const logoColoridaImg = document.getElementById('logoColoridaImg');
            const logoPBImg = document.getElementById('logoPBImg');
            const previewColorida = document.getElementById('previewColorida');
            const previewPB = document.getElementById('previewPB');
            
            const urlImagem = obterUrlImagem();
            
            if (urlImagem) {
                mostrarLoading('Carregando logos...');
                
                try {
                    // Se for URL do Cloudinary, converter para base64 primeiro
                    if (urlImagem.startsWith('http')) {
                        console.log('Convertendo URL do Cloudinary para base64...');
                        logoColoridaBase64 = await urlParaBase64(urlImagem);
                    } else {
                        // Já é base64
                        logoColoridaBase64 = urlImagem;
                    }
                    
                    // Mostrar logo colorida
                    logoColoridaImg.src = logoColoridaBase64;
                    logoColoridaImg.style.display = 'block';
                    
                    // Converter e mostrar logo PB
                    console.log('Convertendo para preto e branco...');
                    logoPBBase64 = await converterParaPretoBranco(logoColoridaBase64);
                    logoPBImg.src = logoPBBase64;
                    logoPBImg.style.display = 'block';
                    
                    esconderLoading();
                    
                } catch (error) {
                    console.error('Erro ao carregar imagens:', error);
                    esconderLoading();
                    
                    // Mostrar mensagem de erro
                    previewColorida.innerHTML = '<span style="color: #e53e3e;">Erro ao carregar</span>';
                    previewPB.innerHTML = '<span style="color: #e53e3e;">Erro ao carregar</span>';
                }
            } else {
                // Não tem logo
                window.location.href = 'semlogo.html';
            }
        }

        // Baixar logo
        async function baixarLogo(tipo) {
            if (!clienteAtual) return;

            let dataUrl;
            let fileName;
            const nomeCliente = (clienteAtual.nome || 'cliente').replace(/[^a-zA-Z0-9]/g, '_');

            if (tipo === 'colorida') {
                if (!logoColoridaBase64) {
                    alert('Logo colorida não disponível!');
                    return;
                }
                dataUrl = logoColoridaBase64;
                fileName = `logo-colorida-${nomeCliente}.png`;
            } else {
                if (!logoPBBase64) {
                    alert('Logo PB não disponível!');
                    return;
                }
                dataUrl = logoPBBase64;
                fileName = `logo-pb-${nomeCliente}.png`;
            }

            const link = document.createElement('a');
            link.download = fileName;
            link.href = dataUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            window.location.href = 'baixada.html';
        }

        // Ir para tela do cartão
        function irParaCartao() {
            window.location.href = 'cartao.html';
        }

        // Função para limpar "sim," e "não," em qualquer variação
        function limparNomeEmpresa(nome) {
            if (!nome) return '';
            
            let nomeLimpo = nome;
            
            const padroesSim = [
                /^sim,\s*/i,
                /\ssim,\s*/i,
                /,\s*sim,\s*/i,
                /sim\s*$/i,
                /sim\s*,\s*/i,
                /^sim\s*$/i
            ];
            
            const padroesNao = [
                /^não,\s*/i,
                /^nao,\s*/i,
                /\snão,\s*/i,
                /\snao,\s*/i,
                /,\s*não,\s*/i,
                /,\s*nao,\s*/i,
                /não\s*$/i,
                /nao\s*$/i,
                /não\s*,\s*/i,
                /nao\s*,\s*/i,
                /^não\s*$/i,
                /^nao\s*$/i,
                /\bnão\b/i,
                /\bnao\b/i
            ];
            
            for (const padrao of padroesSim) {
                nomeLimpo = nomeLimpo.replace(padrao, '');
            }
            
            for (const padrao of padroesNao) {
                nomeLimpo = nomeLimpo.replace(padrao, '');
            }
            
            nomeLimpo = nomeLimpo
                .replace(/\s*,\s*/g, ',')
                .replace(/,,+/g, ',')
                .replace(/^\s*,\s*/, '')
                .replace(/\s*,\s*$/, '')
                .replace(/\s+/g, ' ')
                .trim();
            
            if (nomeLimpo === '' || nomeLimpo === ',' || nomeLimpo === ' ') {
                return '';
            }
            
            return nomeLimpo;
        }

        // Função para obter o nome a ser exibido
        function obterNomeExibicao(cliente) {
            let empresaNome = cliente.empresaNome || '';
            let nomePessoa = cliente.nome || '';
            
            let empresaNomeLimpo = limparNomeEmpresa(empresaNome);
            
            if (empresaNomeLimpo && empresaNomeLimpo !== '' && empresaNomeLimpo.length <= 25) {
                return empresaNomeLimpo;
            }
            
            if (nomePessoa && nomePessoa !== '' && nomePessoa.length <= 25) {
                return nomePessoa;
            }
            
            if (empresaNomeLimpo && empresaNomeLimpo !== '') {
                return empresaNomeLimpo.substring(0, 23);
            }
            
            if (nomePessoa && nomePessoa !== '') {
                return nomePessoa.substring(0, 23);
            }
            
            return 'Nome da Empresa';
        }
    </script>
</body>
</html>
